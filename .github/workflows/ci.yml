name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  NEOGUARD_DB_HOST: localhost
  NEOGUARD_DB_PORT: "5432"
  NEOGUARD_DB_NAME: neoguard
  NEOGUARD_DB_USER: neoguard
  NEOGUARD_DB_PASSWORD: neoguard_ci
  NEOGUARD_CLICKHOUSE_HOST: localhost
  NEOGUARD_CLICKHOUSE_PORT: "8123"

jobs:
  # ─── Backend: Lint + Type Check ─────────────────────────────────────
  backend-lint:
    name: Backend Lint & Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check src/ tests/

      - name: Mypy type check
        run: python -m mypy src/neoguard/

  # ─── Backend: Unit Tests ────────────────────────────────────────────
  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --junitxml=reports/unit-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: reports/unit-results.xml

  # ─── Backend: Integration Tests ─────────────────────────────────────
  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: neoguard
          POSTGRES_USER: neoguard
          POSTGRES_PASSWORD: neoguard_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U neoguard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        env:
          CLICKHOUSE_DB: neoguard
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ""
        ports:
          - 8123:8123
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short --junitxml=reports/integration-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: reports/integration-results.xml

  # ─── Frontend: Lint + Type Check + Tests ────────────────────────────
  frontend:
    name: Frontend Lint, Types & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Vitest
        run: npm run test -- --reporter=junit --outputFile=../reports/frontend-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: reports/frontend-results.xml

  # ─── Build Check ────────────────────────────────────────────────────
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-unit, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend production build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Docker build (backend)
        run: docker build -t neoguard-api:ci .
