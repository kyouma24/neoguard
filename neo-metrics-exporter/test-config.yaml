api_key: obl_live_v2_testkey_ubuntu_demo
endpoint: http://127.0.0.1:9999
cloud_detection: skip

cpu:
  per_core: false

collection:
  interval_seconds: 10
  process_interval_seconds: 10
  slow_interval_seconds: 30

transport:
  batch_max_size: 5000
  batch_max_interval_seconds: 5
  request_timeout_seconds: 10

buffer:
  memory_max_items: 50000

process:
  top_n: 10

saturation:
  window_size: 10

file_watch:
  paths:
    - /var/log/*.log
    - /etc/hostname
  max_files: 20

extra_tags:
  environment: ubuntu-test
  team: neoguard

logging:
  level: info
  format: text
