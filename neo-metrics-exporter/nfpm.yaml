name: neoguard-agent
arch: ${GOARCH}
platform: linux
version: ${VERSION}
maintainer: NeoGuard <ops@neoguard.io>
description: NeoGuard host metrics agent — collects system metrics and ships to NeoGuard ingest API
vendor: NeoGuard
homepage: https://github.com/neoguard/neo-metrics-exporter
license: Proprietary

contents:
  - src: bin/neoguard-agent-linux-${GOARCH}
    dst: /usr/bin/neoguard-agent
    file_info:
      mode: 0755

  - src: deploy/neoguard-agent.service
    dst: /lib/systemd/system/neoguard-agent.service
    file_info:
      mode: 0644

  - src: agent.yaml
    dst: /etc/neoguard/agent.yaml
    type: config|noreplace
    file_info:
      mode: 0640
      owner: neoguard
      group: neoguard

  - dst: /var/lib/neoguard
    type: dir
    file_info:
      mode: 0750
      owner: neoguard
      group: neoguard

  - dst: /var/lib/neoguard/wal
    type: dir
    file_info:
      mode: 0750
      owner: neoguard
      group: neoguard

  - dst: /var/lib/neoguard/logs-spool
    type: dir
    file_info:
      mode: 0750
      owner: neoguard
      group: neoguard

  - dst: /var/lib/neoguard/logs-dead-letter
    type: dir
    file_info:
      mode: 0750
      owner: neoguard
      group: neoguard

  - dst: /var/lib/neoguard/log_cursors
    type: dir
    file_info:
      mode: 0750
      owner: neoguard
      group: neoguard

  - dst: /var/log/neoguard
    type: dir
    file_info:
      mode: 0750
      owner: neoguard
      group: neoguard

scripts:
  preinstall: deploy/preinstall.sh
  postinstall: deploy/postinstall.sh
  preremove: deploy/preremove.sh
